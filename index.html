<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vishwa Patel — Software Engineer</title>
<meta name="description" content="Software engineer building reliable data pipelines and full-stack products. MS Computer Science at USC, graduating Dec 2027.">
<meta name="theme-color" content="#0F172A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="progress" id="progress"></div>

<div class="bg-blobs" aria-hidden="true">
  <span class="blob blob-1"></span>
  <span class="blob blob-2"></span>
  <span class="blob blob-3"></span>
  <span class="bg-grid"></span>
</div>

<header class="nav" id="nav">
  <a class="brand" href="#top">VP</a>
  <nav class="nav-links" id="nav-links">
    <a href="#about">About</a>
    <a href="#experience">Experience</a>
    <a href="#projects">Projects</a>
    <a href="#numbers">Numbers</a>
    <a href="#education">Education</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </nav>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" type="button">
    <span aria-hidden="true">◐</span>
  </button>
</header>

<main id="top">

  <section class="hero" id="hero"><!-- rendered by app.js --></section>

  <section class="section" id="about">
    <p class="eyebrow">About</p>
    <p class="about-text" id="about-text"></p>
  </section>

  <section class="section" id="experience">
    <p class="eyebrow">Experience</p>
    <div class="timeline" id="experience-list"></div>
  </section>

  <section class="section" id="projects">
    <p class="eyebrow">Projects</p>
    <div class="filters" id="project-filters"></div>
    <div class="grid" id="project-grid"></div>
  </section>

  <section class="section" id="numbers">
    <p class="eyebrow">By the Numbers</p>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="gh-panel" id="gh-panel">
      <p class="gh-title">Live from GitHub</p>
      <div class="gh-stats" id="gh-stats">
        <div class="gh-stat"><b id="gh-repos">—</b><span>public repos</span></div>
        <div class="gh-stat"><b id="gh-followers">—</b><span>followers</span></div>
        <div class="gh-stat"><b id="gh-stars">—</b><span>stars earned</span></div>
      </div>
    </div>
  </section>

  <section class="section" id="education">
    <p class="eyebrow">Education</p>
    <div class="timeline" id="education-list"></div>
  </section>

  <section class="section" id="skills">
    <p class="eyebrow">Skills</p>
    <div class="skills-grid" id="skills-list"></div>
  </section>

  <section class="section" id="awards">
    <p class="eyebrow">Certifications &amp; Awards</p>
    <div class="awards-list" id="awards-list"></div>
  </section>

  <section class="section contact" id="contact">
    <p class="eyebrow">Contact</p>
    <div id="contact-content"></div>
  </section>

</main>

<footer class="footer" id="footer"></footer>

<button class="to-top" id="to-top" aria-label="Back to top" type="button">↑</button>

<script src="data/site-data.js"></script>
<script src="app.js"></script>
</body>
</html>
